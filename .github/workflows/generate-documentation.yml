name: '📄 Generate Documentation'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for all branches and tags.
          # This is necessary for generating accurate release notes
          # and to identify changes across different parts of the monorepo.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Sesuaikan dengan versi Node.js yang Anda gunakan
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project (if necessary)
        run: pnpm run build # Asumsi ada script build di root package.json

      - name: Generate TSDoc Markdown
        id: generate_tsdoc_markdown
        run: node scripts/generate-tsdoc-markdown.js

      - name: Generate Functional Feature Documentation
        id: generate_functional_docs
        run: node scripts/generate-functional-docs.js

      - name: Generate Release Notes
        id: generate_release_notes
        run: node scripts/generate-release-notes.js

      - name: Commit and push documentation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/technical/ docs/features/ CHANGELOG.md # Sesuaikan path sesuai struktur yang disepakati
          git commit -m "docs: auto-generate documentation [skip ci]" || echo "No changes to commit"
          git push

      - name: Publish Release Notes to External System
        id: publish_external
        env:
          EXTERNAL_API_TOKEN: ${{ secrets.EXTERNAL_API_TOKEN }} # Contoh: API token untuk sistem eksternal
        run: |
          # Placeholder: Ganti dengan perintah untuk memanggil API sistem dokumentasi eksternal Anda
          # Contoh: node scripts/publish-to-confluence.js
          echo "::notice file=README.md,line=1::External documentation publication skipped (placeholder)"
