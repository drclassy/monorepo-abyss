# Entry workflow: triggers + permissions + concurrency; heavy lifting in reusable-verify.yml
name: The Abyss CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.github/*.png'
      - '.github/*.svg'
      - '.github/logos/**'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-verify.yml
    secrets: inherit
    with:
      turbo_team: ${{ vars.TURBO_TEAM }}
