name: The Abyss CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/*.png'
      - '.github/*.svg'
      - '.github/logos/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  verify:
    name: Verify & GO-Gate Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Iskandar GO-Gate
        run: pnpm --filter @the-abyss/iskandar-gatekeeper run start
        continue-on-error: false

      - name: Check Agent Memory Status
        run: |
          echo "Checking for .agent/ directories across the monorepo"
          agent_count=$(find . -type d -name ".agent" | wc -l)
          if [ "$agent_count" -eq 0 ]; then
            echo "⚠️ No .agent/ directories found"
          else
            echo "✅ Found $agent_count .agent/ directories"
            find . -type d -name ".agent" -exec echo "  - {}" \;
          fi

  build:
    name: Build Affected Projects
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Affected Projects
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            pnpm turbo run build --filter=[HEAD^1]
          else
            pnpm turbo run build
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/**/dist
          retention-days: 7

  test:
    name: Test Affected Projects
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Test Affected Projects
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            pnpm turbo run test --filter=[HEAD^1]
          else
            pnpm turbo run test
          fi

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage'
          retention-days: 7

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            pnpm turbo run lint --filter=[HEAD^1]
          else
            pnpm turbo run lint
          fi

      - name: Check Format
        run: pnpm format:check

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  flows:
    name: Test Langflow Definitions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Flow JSON Files
        run: |
          shopt -s nullglob
          files=(flows/definitions/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No flow definitions found — skipping validation"
          else
            for file in "${files[@]}"; do
              echo "Validating $file"
              node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || exit 1
            done
          fi

      - name: Run Flow Tests
        run: pnpm flows:test || echo "No flow tests found"
