name: '🤖 Reusable AI Agent'
# =============================================================================
# Reusable workflow: AI Agent Dispatch
# Sentra AI — The Abyss Monorepo
# Consolidates: Claude + Gemini agent invocation into a single reusable caller
# Called by: gemini-dispatch.yml, auto-fix.yml, and any future AI agent triggers
# =============================================================================

on:
  workflow_call:
    inputs:
      agent:
        description: 'AI agent to invoke (claude | gemini)'
        required: false
        type: string
        default: 'gemini'
      command:
        description: 'Command to execute (review | triage | invoke | plan-execute)'
        required: true
        type: string
      additional_context:
        description: 'Extra context to pass to the agent'
        required: false
        type: string
        default: ''
      issue_number:
        description: 'Issue or PR number to comment on'
        required: false
        type: string
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      APP_PRIVATE_KEY:
        required: false
      # GITHUB_TOKEN is automatic (github.token); do not declare under workflow_call.secrets
      # or GitHub rejects the workflow file (failed run with 0 jobs).

jobs:
  invoke-agent:
    name: 'Invoke ${{ inputs.agent }} — ${{ inputs.command }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 'Resolve agent config'
        id: config
        run: |
          AGENT="${{ inputs.agent }}"
          COMMAND="${{ inputs.command }}"

          if [ "$AGENT" = "claude" ]; then
            echo "model=claude-sonnet-4-6" >> $GITHUB_OUTPUT
            echo "provider=anthropic" >> $GITHUB_OUTPUT
          else
            echo "model=gemini-2.5-pro" >> $GITHUB_OUTPUT
            echo "provider=google" >> $GITHUB_OUTPUT
          fi

          echo "command=$COMMAND" >> $GITHUB_OUTPUT
          echo "Agent: $AGENT | Command: $COMMAND"

      - name: 'Acknowledge request'
        if: inputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          AGENT: ${{ inputs.agent }}
          COMMAND: ${{ inputs.command }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "🤖 **$AGENT** is processing your **$COMMAND** request. [Track progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --repo "${{ github.repository }}" || true

      - name: 'Run agent command'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGENT: ${{ inputs.agent }}
          COMMAND: ${{ steps.config.outputs.command }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Dispatching: agent=$AGENT command=$COMMAND"
          # Agent execution is handled by the calling workflow's specific logic
          # This reusable workflow provides: auth, acknowledgement, and context resolution
          echo "Agent dispatch complete"
