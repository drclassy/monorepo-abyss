name: Hermes Agent Prototype

on:
  push:
    paths:
      - "apps/prototype/hermes-agent/**"
      - ".github/workflows/hermes-agent-prototype.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "apps/prototype/hermes-agent/**"
      - ".github/workflows/hermes-agent-prototype.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

concurrency:
  group: hermes-agent-prototype-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @the-abyss/hermes-agent-prototype run typecheck

      - name: Lint
        run: pnpm --filter @the-abyss/hermes-agent-prototype run lint

      - name: Build
        run: pnpm --filter @the-abyss/hermes-agent-prototype run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/prototype/hermes-agent/Dockerfile
          push: false
          tags: hermes-agent-prototype:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max