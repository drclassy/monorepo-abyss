name: Auto-Fix CI

on:
  workflow_run:
    workflows: ['The Abyss CI']
    types: [completed]
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  auto-fix:
    name: Auto-Fix CI Failures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "Claudesy Auto-Fix Bot"
          git config user.email "bot@claudesy.dev"

      - name: Fix — Prettier Format
        id: fix_format
        run: |
          pnpm format --write 2>&1 && echo "fixed=true" >> $GITHUB_OUTPUT || echo "fixed=false" >> $GITHUB_OUTPUT

      - name: Fix — ESLint Auto-Fix
        id: fix_lint
        run: |
          pnpm turbo run lint -- --fix 2>&1 && echo "fixed=true" >> $GITHUB_OUTPUT || echo "fixed=false" >> $GITHUB_OUTPUT

      - name: Check for Changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit — failures require manual fix"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Diagnose Remaining Failures
        id: diagnose
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "## Diagnosis" >> diagnosis.md
          echo "" >> diagnosis.md
          echo "Auto-fix ran but could not resolve all issues. Manual fixes required:" >> diagnosis.md
          echo "" >> diagnosis.md

          # Check lint
          pnpm turbo run lint 2>&1 | grep "error" | head -20 >> diagnosis.md || true

          # Check format
          pnpm format:check 2>&1 | grep "warn\|error" | head -10 >> diagnosis.md || true

          cat diagnosis.md

      - name: Create Pull Request with Fixes
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(auto): Prettier + ESLint auto-fix from CI failure'
          branch: auto-fix/${{ github.event.workflow_run.head_branch }}-${{ github.run_id }}
          base: ${{ github.event.workflow_run.head_branch }}
          title: '🤖 Auto-Fix: Format + Lint Issues'
          body: |
            ## Auto-Fix Summary

            CI failed on `${{ github.event.workflow_run.head_branch }}` — bot automatically applied fixable corrections.

            ### What was fixed
            - Prettier formatting (`pnpm format --write`)
            - ESLint import ordering + auto-fixable rules (`eslint --fix`)

            ### What still needs manual attention
            Issues that are NOT auto-fixable (TypeScript errors, missing deps, logic bugs)
            will still show as CI failures — check the original failed run for details.

            ### Original failing run
            ${{ github.event.workflow_run.html_url }}

            ---
            > Review changes below, then approve + merge to resolve CI.

            🤖 Generated by Claudesy Auto-Fix Bot
          labels: 'auto-fix,bot'
          draft: false

      - name: Comment on Failure — Manual Fix Required
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "⚠️ Auto-fix could not resolve CI failures automatically."
          echo "These require manual attention — check the original run:"
          echo "${{ github.event.workflow_run.html_url }}"
          cat diagnosis.md || true
