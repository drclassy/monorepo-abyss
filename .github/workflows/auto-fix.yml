# Runs after "The Abyss CI" fails; only same-repo runs may push fixes (fork-safe).
name: Auto-Fix CI

on:
  workflow_run:
    workflows: ['The Abyss CI']
    types: [completed]
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  auto-fix:
    name: Auto-Fix CI Failures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "Classy Auto-Fix Bot"
          git config user.email "bot@classy.dev"

      - name: Fix — Prettier format
        id: fix_format
        run: |
          pnpm format --write 2>&1 && echo "fixed=true" >> $GITHUB_OUTPUT || echo "fixed=false" >> $GITHUB_OUTPUT

      - name: Fix — ESLint auto-fix
        id: fix_lint
        run: |
          pnpm turbo run lint -- --fix 2>&1 && echo "fixed=true" >> $GITHUB_OUTPUT || echo "fixed=false" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit — failures require manual fix"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Diagnose remaining failures
        id: diagnose
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "## Diagnosis" >> diagnosis.md
          echo "" >> diagnosis.md
          echo "Auto-fix ran but could not resolve all issues. Manual fixes required:" >> diagnosis.md
          echo "" >> diagnosis.md
          pnpm turbo run lint 2>&1 | grep "error" | head -20 >> diagnosis.md || true
          pnpm format:check 2>&1 | grep "warn\|error" | head -10 >> diagnosis.md || true
          cat diagnosis.md

      - name: Create pull request with fixes
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(auto): Prettier + ESLint auto-fix from CI failure'
          branch: auto-fix/${{ github.event.workflow_run.head_branch }}-${{ github.run_id }}
          base: ${{ github.event.workflow_run.head_branch }}
          title: 'Auto-Fix: format + lint issues'
          body: |
            ## Auto-Fix Summary

            CI failed on `${{ github.event.workflow_run.head_branch }}` — bot applied fixable formatting and ESLint auto-fixes.

            ### What was fixed
            - Prettier (`pnpm format --write`)
            - ESLint auto-fix (`pnpm turbo run lint -- --fix`)

            ### Manual follow-up
            Typecheck failures, missing dependencies, and logic errors still require human changes.

            ### Original run
            ${{ github.event.workflow_run.html_url }}

            ---
            Review and merge when ready.

            Generated by Classy Auto-Fix Bot
          labels: 'auto-fix,bot'
          draft: false

      - name: Log when no PR created
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "Auto-fix could not resolve CI failures automatically."
          echo "${{ github.event.workflow_run.html_url }}"
          cat diagnosis.md || true
