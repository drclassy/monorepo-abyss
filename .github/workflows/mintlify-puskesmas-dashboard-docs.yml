# Validates Mintlify documentation for apps/healthcare/sentra-dashboard when docs or API routes change.
name: Mintlify docs — Puskesmas Dashboard

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'apps/healthcare/sentra-dashboard/mintlify-docs/**'
      - 'apps/healthcare/sentra-dashboard/src/app/api/**'
      - 'apps/healthcare/sentra-dashboard/scripts/update-api-docs.mjs'
      - 'apps/healthcare/sentra-dashboard/package.json'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'apps/healthcare/sentra-dashboard/mintlify-docs/**'
      - 'apps/healthcare/sentra-dashboard/src/app/api/**'
      - 'apps/healthcare/sentra-dashboard/scripts/update-api-docs.mjs'
      - 'apps/healthcare/sentra-dashboard/package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  mintlify-docs-check:
    name: Mintlify validate and broken-links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mintlify docs check
        run: pnpm --filter @the-abyss/sentra-dashboard run docs:check
