name: Security Primary Healthcare

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/healthcare/primary-healthcare/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/security-primary-healthcare.yml'
  push:
    branches: [main, develop]
    paths:
      - 'apps/healthcare/primary-healthcare/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/security-primary-healthcare.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  security-scans:
    name: Security Scans (Primary Healthcare)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Catch Pattern Scan
        run: |
          pnpm --filter @the-abyss/puskesmas-dashboard run security:catch-scan
          pnpm --filter @the-abyss/puskesmas-website run security:catch-scan

      - name: Secret Pattern Scan
        run: |
          pnpm --filter @the-abyss/puskesmas-dashboard run security:secret-scan
          pnpm --filter @the-abyss/puskesmas-website run security:secret-scan

      - name: Dependency Audit (High/Critical)
        run: |
          pnpm --filter @the-abyss/puskesmas-dashboard run security:audit
          pnpm --filter @the-abyss/puskesmas-website run security:audit
