# Abyss Platform - Infrastructure Configuration
# Single Source of Truth for Abyss Microservices

services:
  # Abyss Database (PostgreSQL)
  abyss-database:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    container_name: Abyss-Database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-abyss}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-abyss_secure_password}
      POSTGRES_DB: ${DATABASE_NAME:-abyss_db}
    ports:
      - "5432:5432"
    volumes:
      - abyss_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abyss"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Abyss Message Broker (Kafka via Confluent)
  abyss-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0@sha256:02f6c042bb9a7844382fc4cedc513a44585d8a5acae873fb9e510e3ca9dcabc6
    container_name: Abyss-Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  abyss-kafka:
    image: confluentinc/cp-kafka:7.5.0@sha256:fbbb6fa11b258a88b83f54d4f0bddfcffbf2279f99d66a843486e3da7bdfbf41
    container_name: Abyss-Kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: abyss-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://abyss-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - abyss-zookeeper

  # Abyss AI Engine (Langflow)
  abyss-ai-engine:
    image: langflowai/langflow:latest@sha256:59b00513151c224090e2d062ba94b2b5ba7f9f46922d2704bdf1090b59424d81
    container_name: Abyss-AI-Engine
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///app/langflow.db
    volumes:
      - abyss_langflow_data:/app
    depends_on:
      - abyss-database

  # Abyss Cache (Redis)
  abyss-cache:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: Abyss-Cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - abyss_redis_data:/data

  # Abyss Orchestrator (NestJS)
  abyss-orchestrator:
    build:
      context: ../../
      dockerfile: ./apps/platform/orchestrator/Dockerfile
    container_name: Abyss-Orchestrator
    environment:
      - DATABASE_URL=postgresql://abyss:abyss_secure_password@abyss-database:5432/abyss_db
      - KAFKA_BROKER=abyss-kafka:29092
    depends_on:
      - abyss-database
      - abyss-kafka
    ports:
      - "3001:3001"

volumes:
  abyss_postgres_data:
  abyss_langflow_data:
  abyss_redis_data:

networks:
  default:
    name: abyss-platform-network
