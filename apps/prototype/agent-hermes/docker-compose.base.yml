# Hermes Maximus — Base Profile (thin-wrap over vendor composes)
# Usage: docker compose -f docker-compose.base.yml up -d

name: hermes-maximus

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-home:
  hindsight-pg0:
  mc-data:

services:
  # ─────────────────────────────────────────────────────────
  # Hindsight — Memory backend (embedded Postgres + API + CP)
  # ─────────────────────────────────────────────────────────
  hindsight:
    build:
      context: ./vendor/hindsight
      dockerfile: docker/standalone/Dockerfile
    container_name: hindsight
    environment:
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: 8888
      HINDSIGHT_ENABLE_API: "true"
      HINDSIGHT_ENABLE_CP: "true"
    ports:
      - "${HERMES_BIND:-127.0.0.1}:8888:8888"
      - "${HERMES_BIND:-127.0.0.1}:9999:9999"
    volumes:
      - hindsight-pg0:/home/hindsight/.pg0
    networks: [hermes-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # Hermes Core — Agent runtime (gateway mode on port 8642)
  # ─────────────────────────────────────────────────────────
  hermes-core:
    build:
      context: ./vendor/hermes-core
      dockerfile: Dockerfile
    container_name: hermes-core
    command: ["gateway", "run"]
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_PORT: "8642"
      NOUS_API_KEY: ${NOUS_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HERMES_HOME: /opt/data
    ports:
      - "${HERMES_BIND:-127.0.0.1}:8642:8642"
    volumes:
      - hermes-home:/opt/data
      - ./config/hermes/config.yaml:/opt/data/config.yaml:ro
      - ./skills:/opt/data/skills
      - ./plugins:/opt/data/plugins
    shm_size: 1gb
    networks: [hermes-net]
    depends_on:
      hindsight:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8642/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # Mission Control — Next.js dashboard (port 3000)
  # Note: OpenClaw-wired. Hermes adapter is Phase 2+ open item.
  # ─────────────────────────────────────────────────────────
  mission-control:
    build:
      context: ./vendor/mission-control
      dockerfile: Dockerfile
    container_name: mission-control
    environment:
      PORT: "3000"
      MC_DEFAULT_GATEWAY_NAME: ${MC_DEFAULT_GATEWAY_NAME:-primary}
      MC_ALLOWED_HOSTS: ${MC_ALLOWED_HOSTS:-localhost,127.0.0.1}
      AUTH_USER: ${AUTH_USER:-}
      AUTH_PASS: ${AUTH_PASS:-}
    ports:
      - "${HERMES_BIND:-127.0.0.1}:${MC_PORT:-3000}:3000"
    volumes:
      - mc-data:/app/.data
    networks: [hermes-net]
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # Workspace UI — Hermes-native client (port 3001)
  # ─────────────────────────────────────────────────────────
  workspace-ui:
    build:
      context: ./vendor/workspace-ui
      dockerfile: Dockerfile
    container_name: workspace-ui
    environment:
      HERMES_API_URL: http://hermes-core:8642
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "${HERMES_BIND:-127.0.0.1}:${WORKSPACE_UI_PORT:-3001}:3000"
    networks: [hermes-net]
    depends_on:
      hermes-core:
        condition: service_healthy
    restart: unless-stopped
