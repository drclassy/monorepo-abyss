# =============================================================================
# Agent Registry — The Abyss Monorepo
# Sentra AI Ecosystem
# Defines all registered agents, their capabilities, triggers, and permissions
# =============================================================================

agents:
  # ---------------------------------------------------------------------------
  # Claude (Anthropic) — Primary Code Agent
  # ---------------------------------------------------------------------------
  - id: claude
    name: Claude
    provider: anthropic
    model: claude-sonnet-4-6
    role: primary-code-agent
    entry_point: CLAUDE.md
    protocol: JET-v2
    capabilities:
      - code-generation
      - code-review
      - architecture-design
      - documentation
      - refactoring
      - test-generation
    permissions:
      read: ["**"]
      write: ["apps/**", "packages/**", "tooling/**", "flows/**", "conductor/**"]
      restricted: ["infrastructure/terraform/**", "infrastructure/docker/**"]
      prohibited: ["terraform apply", "git reset --hard", "rm -rf"]
    triggers:
      - manual
      - claude-code-cli
    compliance:
      phi_access: false
      audit_log: true
      jet_protocol_required: true

  # ---------------------------------------------------------------------------
  # Gemini (Google) — Secondary Review & Triage Agent
  # ---------------------------------------------------------------------------
  - id: gemini
    name: Gemini CLI
    provider: google
    model: gemini-2.5-pro
    role: review-triage-agent
    entry_point: GEMINI.md
    protocol: standard
    capabilities:
      - pr-review
      - issue-triage
      - code-review
      - scheduled-triage
    permissions:
      read: ["**"]
      write: ["comments-only"]
      restricted: ["**"]
      prohibited: ["file-writes", "terraform", "database"]
    triggers:
      - pull_request.opened
      - issues.opened
      - "@gemini-cli mention"
      - scheduled
    compliance:
      phi_access: false
      audit_log: true
      jet_protocol_required: false

  # ---------------------------------------------------------------------------
  # Jen — Sentra Orchestrator (Internal Platform Agent)
  # ---------------------------------------------------------------------------
  - id: jen
    name: Jen
    provider: sentra-internal
    model: claude-sonnet-4-6
    role: platform-orchestrator
    entry_point: ORCHESTRATOR.md
    protocol: JET-v2
    capabilities:
      - saga-orchestration
      - ai-session-management
      - websocket-streaming
      - langflow-integration
      - multi-agent-coordination
    permissions:
      read: ["apps/platform/**", "flows/**", "packages/**"]
      write: ["apps/platform/**", "flows/definitions/**"]
      restricted: ["apps/healthcare/**", "infrastructure/**"]
      prohibited: ["terraform apply", "database migrations"]
    triggers:
      - api
      - saga-event
    compliance:
      phi_access: false
      audit_log: true
      jet_protocol_required: true

  # ---------------------------------------------------------------------------
  # Melinda — Medical Receptionist (Sentra Healthcare Agent)
  # ---------------------------------------------------------------------------
  - id: melinda
    name: Melinda
    provider: sentra-healthcare
    model: claude-sonnet-4-6
    role: medical-receptionist
    entry_point: apps/healthcare/sentra-main/MELINDA.md
    protocol: JET-v2
    capabilities:
      - clinical-triage
      - smart-scheduling
      - patient-onboarding
      - melinda-knowledge-base
    permissions:
      read: ["apps/healthcare/**"]
      write: ["apps/healthcare/sentra-main/**"]
      restricted: ["packages/database/**"]
    triggers:
      - patient-chat
      - appointment-request
    compliance:
      phi_access: true
      audit_log: true
      jet_protocol_required: true

# ---------------------------------------------------------------------------
# Handoff Schema
# Defines how agents pass context between sessions
# ---------------------------------------------------------------------------
handoff:
  storage: ".agent/"
  required_files:
    - CONTEXT.md
    - PROGRESS.md
    - HANDOFF.md
    - LESSONS.md
    - DECISIONS.md
  session_log: ".agent/sessions/YYYY-MM-DD.md"
  format: markdown
  update_policy: "write-before-session-end"

# ---------------------------------------------------------------------------
# Coordination Rules
# ---------------------------------------------------------------------------
coordination:
  parallel_agents_allowed: false
  primary_agent: claude
  conflict_resolution: "chief-decides"
  cross_agent_handoff: true
