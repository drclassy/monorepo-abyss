<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>09 Zen</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      font-weight: 300;
      background: #fafaf9;
      color: #44403c;
      min-height: 100vh;
      padding: 80px 48px;
      letter-spacing: 0.02em;
    }
    .brand { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; color: #a8a29e; margin-bottom: 48px; }
    .systems { max-width: 420px; }
    .line { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #e7e5e4; }
    .line:last-of-type { border-bottom: none; }
    .name { font-size: 15px; font-weight: 400; }
    .state { color: #78716c; }
    .breath { margin-top: 64px; font-size: 15px; line-height: 1.7; color: #57534e; max-width: 36em; }
  </style>
</head>
<body>
  <p class="brand">Portal · mission control</p>
  <div class="systems">
    <div class="line"><span class="name">Agent SSOT</span><span class="state">fresh</span></div>
    <div class="line"><span class="name">Abyss CLI</span><span class="state">two risks</span></div>
    <div class="line"><span class="name">Knowledge</span><span class="state">not ready</span></div>
    <div class="line"><span class="name">UNICOM</span><span class="state">quiet</span></div>
    <div class="line"><span class="name">Context</span><span class="state">local</span></div>
    <div class="line"><span class="name">Prompt</span><span class="state">clear</span></div>
  </div>
  <p class="breath">Next: wire UNICOM health into the summary API so the strip reflects hub state without opening another tool.</p>
</body>
</html>
