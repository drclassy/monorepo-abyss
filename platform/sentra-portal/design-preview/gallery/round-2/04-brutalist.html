<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>04 Brutalist</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: Impact, 'Arial Black', sans-serif; background: #ff0; color: #000; min-height: 100vh; }
    .top { background: #000; color: #ff0; padding: 20px; font-size: 72px; line-height: 0.9; letter-spacing: -2px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; }
    .cell { border: 6px solid #000; padding: 24px; font-size: 28px; min-height: 140px; }
    .cell span { display: block; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; margin-top: 12px; }
    .red { background: #f00; color: #fff; }
    .next { padding: 20px; font-size: 22px; font-family: Arial, sans-serif; border-top: 6px solid #000; }
  </style>
</head>
<body>
  <div class="top">PORTAL</div>
  <div class="grid">
    <div class="cell">SSOT<span>0.3H FRESH</span></div>
    <div class="cell red">CLI<span>2 RISK</span></div>
    <div class="cell">KNOWLEDGE<span>NOT READY</span></div>
    <div class="cell">UNICOM<span>0 AGENTS</span></div>
    <div class="cell">CONTEXT<span>LOCAL</span></div>
    <div class="cell">PROMPT<span>PASS</span></div>
  </div>
  <p class="next"><b>NEXT →</b> Wire UNICOM health into summary API</p>
</body>
</html>
